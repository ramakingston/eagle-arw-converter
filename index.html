<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>RAW to Image Converter</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <div class="titlebar" id="titlebar">
      <img class="titlebar-icon" src="logo.png" alt="">
      <span class="titlebar-title">RAW to Image Converter</span>
      <button id="btnClose" class="titlebar-close" title="Close">&times;</button>
    </div>

    <div id="banner" class="banner" hidden></div>

    <div class="panel">

      <div class="rows">

        <div class="row" id="rowFormat">
          <span class="row-label">Format</span>
          <div class="control dropdown" id="formatControl">
            <span class="control-value" id="formatValue">JPG</span>
            <span class="chevrons">⌃⌄</span>
          </div>
          <div class="dropdown-menu checklist" id="formatMenu" hidden>
            <label class="menu-check">
              <span class="checkbox"><input type="checkbox" value="jpg" checked><span class="checkbox-box"><svg class="checkbox-icon" viewBox="0 0 16 16"><path d="M3 8.2l3.3 3.3L13 4.8"/></svg></span></span>
              <span class="menu-check-label">JPG</span>
            </label>
            <label class="menu-check">
              <span class="checkbox"><input type="checkbox" value="png"><span class="checkbox-box"><svg class="checkbox-icon" viewBox="0 0 16 16"><path d="M3 8.2l3.3 3.3L13 4.8"/></svg></span></span>
              <span class="menu-check-label">PNG</span>
            </label>
            <label class="menu-check">
              <span class="checkbox"><input type="checkbox" value="webp"><span class="checkbox-box"><svg class="checkbox-icon" viewBox="0 0 16 16"><path d="M3 8.2l3.3 3.3L13 4.8"/></svg></span></span>
              <span class="menu-check-label">WEBP</span>
            </label>
            <label class="menu-check">
              <span class="checkbox"><input type="checkbox" value="tiff"><span class="checkbox-box"><svg class="checkbox-icon" viewBox="0 0 16 16"><path d="M3 8.2l3.3 3.3L13 4.8"/></svg></span></span>
              <span class="menu-check-label">TIFF</span>
            </label>
            <label class="menu-check">
              <span class="checkbox"><input type="checkbox" value="bmp"><span class="checkbox-box"><svg class="checkbox-icon" viewBox="0 0 16 16"><path d="M3 8.2l3.3 3.3L13 4.8"/></svg></span></span>
              <span class="menu-check-label">BMP</span>
            </label>
            <label class="menu-check">
              <span class="checkbox"><input type="checkbox" value="gif"><span class="checkbox-box"><svg class="checkbox-icon" viewBox="0 0 16 16"><path d="M3 8.2l3.3 3.3L13 4.8"/></svg></span></span>
              <span class="menu-check-label">GIF</span>
            </label>
            <label class="menu-check">
              <span class="checkbox"><input type="checkbox" value="avif"><span class="checkbox-box"><svg class="checkbox-icon" viewBox="0 0 16 16"><path d="M3 8.2l3.3 3.3L13 4.8"/></svg></span></span>
              <span class="menu-check-label">AVIF</span>
            </label>
          </div>
        </div>

        <div class="row" id="rowQuality">
          <span class="row-label">Quality</span>
          <div class="control stepper">
            <input type="number" id="qualityInput" min="1" max="100" value="90">
            <div class="stepper-buttons">
              <button type="button" id="qualityUp" class="stepper-btn" tabindex="-1">▲</button>
              <button type="button" id="qualityDown" class="stepper-btn" tabindex="-1">▼</button>
            </div>
          </div>
        </div>

        <div class="row" id="rowSize">
          <span class="row-label">Size</span>
          <div class="control dropdown" id="sizeControl">
            <span class="control-value" id="sizeValue">Original</span>
            <span class="chevrons">⌃⌄</span>
          </div>
          <div class="dropdown-menu" id="sizeMenu" hidden>
            <div class="menu-item selected" data-value="original">Original</div>
            <div class="menu-item" data-value="custom">Scale&hellip;</div>
          </div>
        </div>

        <div class="row sub-row" id="rowSizeCustom" hidden>
          <span class="row-label">Scale</span>
          <div class="control stepper">
            <input type="number" id="sizeCustomInput" min="1" max="200" value="50">
            <span class="unit">%</span>
            <div class="stepper-buttons">
              <button type="button" id="sizePercentUp" class="stepper-btn" tabindex="-1">▲</button>
              <button type="button" id="sizePercentDown" class="stepper-btn" tabindex="-1">▼</button>
            </div>
          </div>
        </div>

      </div>

      <div class="divider"></div>

      <div class="file-section">
        <div class="file-section-head">
          <span>Files</span>
          <span id="fileCount" class="muted">0</span>
        </div>
        <div id="fileList" class="file-list">
          <div class="empty-state">Select .ARW files in your Eagle library.</div>
        </div>
      </div>

    </div>

    <div class="footer">
      <button id="btnConvert" class="btn btn-primary" disabled>Convert</button>
      <button id="btnClose2" class="btn btn-secondary">Close</button>
    </div>

  </div>

  <script type="text/javascript" src="js/plugin.js"></script>
</body>
</html>
