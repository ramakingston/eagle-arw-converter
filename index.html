<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>RAW to Image Converter</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <div class="titlebar" id="titlebar">
      <img class="titlebar-icon" src="logo.png" alt="">
      <span class="titlebar-title">RAW to Image Converter</span>
      <button id="btnClose" class="titlebar-close" title="Close">&times;</button>
    </div>

    <div id="banner" class="banner" hidden></div>

    <div class="panel">

      <div class="rows">

        <div class="row" id="rowFormat">
          <span class="row-label">Format</span>
          <div class="control dropdown" id="formatControl">
            <span class="control-value" id="formatValue">JPG</span>
            <span class="chevrons">⌃⌄</span>
          </div>
          <div class="dropdown-menu checklist" id="formatMenu" hidden>
            <label class="menu-check"><input type="checkbox" value="jpg" checked><span>JPG</span></label>
            <label class="menu-check"><input type="checkbox" value="png"><span>PNG</span></label>
            <label class="menu-check"><input type="checkbox" value="webp"><span>WEBP</span></label>
            <label class="menu-check"><input type="checkbox" value="tiff"><span>TIFF</span></label>
            <label class="menu-check"><input type="checkbox" value="bmp"><span>BMP</span></label>
            <label class="menu-check"><input type="checkbox" value="gif"><span>GIF</span></label>
            <label class="menu-check"><input type="checkbox" value="avif"><span>AVIF</span></label>
          </div>
        </div>

        <div class="row" id="rowQuality">
          <span class="row-label">Quality</span>
          <div class="control stepper">
            <input type="number" id="qualityInput" min="1" max="100" value="90">
            <div class="stepper-buttons">
              <button type="button" id="qualityUp" class="stepper-btn" tabindex="-1">▲</button>
              <button type="button" id="qualityDown" class="stepper-btn" tabindex="-1">▼</button>
            </div>
          </div>
        </div>

        <div class="row" id="rowSize">
          <span class="row-label">Size</span>
          <div class="control dropdown" id="sizeControl">
            <span class="control-value" id="sizeValue">Original</span>
            <span class="chevrons">⌃⌄</span>
          </div>
          <div class="dropdown-menu" id="sizeMenu" hidden>
            <div class="menu-item selected" data-value="original">Original</div>
            <div class="menu-item" data-value="custom">Custom&hellip;</div>
          </div>
        </div>

        <div class="row sub-row" id="rowSizeCustom" hidden>
          <span class="row-label">Max side</span>
          <div class="control">
            <input type="number" id="sizeCustomInput" min="16" value="4096">
            <span class="unit">px</span>
          </div>
        </div>

        <div class="row" id="rowSaveTo">
          <span class="row-label">Save to</span>
          <div class="control dropdown" id="saveToControl">
            <span class="control-value" id="saveToValue">Same folder</span>
            <span class="chevrons">⌃⌄</span>
          </div>
          <div class="dropdown-menu" id="saveToMenu" hidden>
            <div class="menu-item selected" data-value="source">Same folder as original</div>
            <div class="menu-item" data-value="custom">Choose folder&hellip;</div>
          </div>
        </div>

      </div>

      <div class="divider"></div>

      <div class="rows">
        <div class="row">
          <span class="row-label">Add to Eagle</span>
          <label class="switch">
            <input type="checkbox" id="addToEagle" checked>
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </label>
        </div>
      </div>

      <div class="divider"></div>

      <div class="file-section">
        <div class="file-section-head">
          <span>Files</span>
          <span id="fileCount" class="muted">0</span>
        </div>
        <div id="fileList" class="file-list">
          <div class="empty-state">Select .ARW files in your Eagle library.</div>
        </div>
      </div>

    </div>

    <div class="footer">
      <button id="btnConvert" class="btn btn-primary" disabled>Convert</button>
      <button id="btnClose2" class="btn btn-secondary">Close</button>
    </div>

  </div>

  <script type="text/javascript" src="js/plugin.js"></script>
</body>
</html>
